host: localhost:3000
info:
  contact: {}
  description: Task management REST API
  title: Dimaist API
  version: "1.0"
paths:
  /find:
    get:
      operationId: find_items
      parameters:
      - description: Search query
        in: query
        name: q
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.FindResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Search across tasks and projects
      tags:
      - search
  /projects:
    get:
      operationId: list_projects
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/database.Project'
            type: array
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: List all projects
      tags:
      - projects
    post:
      consumes:
      - application/json
      operationId: create_project
      parameters:
      - description: Project to create
        in: body
        name: project
        required: true
        schema:
          $ref: '#/definitions/main.CreateProjectRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/database.Project'
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Create a new project
      tags:
      - projects
  /projects-reorder:
    put:
      consumes:
      - application/json
      operationId: reorder_projects
      parameters:
      - description: Ordered list of project IDs
        in: body
        name: project_ids
        required: true
        schema:
          items:
            type: integer
          type: array
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Reorder projects
      tags:
      - projects
  /projects/{project_id}:
    delete:
      operationId: delete_project
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: integer
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Delete a project
      tags:
      - projects
    put:
      consumes:
      - application/json
      operationId: update_project
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: integer
      - description: Project fields to update
        in: body
        name: project
        required: true
        schema:
          $ref: '#/definitions/main.UpdateProjectRequest'
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Update a project
      tags:
      - projects
  /projects/{project_id}/tasks/reorder:
    put:
      consumes:
      - application/json
      operationId: reorder_project_tasks
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: integer
      - description: Ordered list of task IDs
        in: body
        name: task_ids
        required: true
        schema:
          items:
            type: integer
          type: array
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Reorder tasks within a project
      tags:
      - projects
  /sync:
    get:
      operationId: sync_data
      parameters:
      - description: Opaque revision cursor; empty or 0 means full sync
        in: query
        name: sync_token
        type: string
      - description: Max rows per table (default 1000)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.SyncResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Sync data with incremental updates
      tags:
      - sync
  /tasks:
    get:
      operationId: list_tasks
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/database.Task'
            type: array
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: List all tasks
      tags:
      - tasks
    post:
      consumes:
      - application/json
      operationId: create_task
      parameters:
      - description: Task to create
        in: body
        name: task
        required: true
        schema:
          $ref: '#/definitions/main.CreateTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.CreateTaskResponse'
        "400":
          description: Bad Request
          schema:
            type: string
      summary: Create a new task
      tags:
      - tasks
  /tasks/{task_id}:
    delete:
      operationId: delete_task
      parameters:
      - description: Task ID
        in: path
        name: task_id
        required: true
        type: integer
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Delete a task
      tags:
      - tasks
    get:
      operationId: get_task
      parameters:
      - description: Task ID
        in: path
        name: task_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/database.Task'
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Get a task by ID
      tags:
      - tasks
    put:
      consumes:
      - application/json
      operationId: update_task
      parameters:
      - description: Task ID
        in: path
        name: task_id
        required: true
        type: integer
      - description: Task fields to update
        in: body
        name: task
        required: true
        schema:
          $ref: '#/definitions/main.UpdateTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.UpdateTaskResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Update a task
      tags:
      - tasks
  /tasks/{task_id}/complete:
    post:
      operationId: complete_task
      parameters:
      - description: Task ID
        in: path
        name: task_id
        required: true
        type: integer
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Mark a task as complete
      tags:
      - tasks
swagger: "2.0"
