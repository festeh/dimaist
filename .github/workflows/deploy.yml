name: Build and Deploy Go Backend

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  APP_NAME: dimaist
  DEPLOY_PATH: /root/dimaist

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.0'
        cache-dependency-path: backend/go.sum
    
    - name: Build Go backend
      run: |
        cd backend
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ${{ env.APP_NAME }} .
    
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts
    
    - name: Create deployment directory
      run: |
        ssh root@${{ secrets.HOST }} "mkdir -p ${{ env.DEPLOY_PATH }}"
    
    - name: Deploy binary to remote host
      run: |
        scp backend/${{ env.APP_NAME }} root@${{ secrets.HOST }}:${{ env.DEPLOY_PATH }}/
    
    - name: Deploy systemd service file
      run: |
        scp backend/systemd/${{ env.APP_NAME }}.service root@${{ secrets.HOST }}:/etc/systemd/system/
    
    - name: Deploy environment variables
      run: |
        cat > .env << EOF
        DATABASE_URL=${{ secrets.DATABASE_URL }}
        ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}
        PORT=${{ secrets.PORT }}
        EOF
        scp .env root@${{ secrets.HOST }}:${{ env.DEPLOY_PATH }}/.env
        rm .env
    
    - name: Enable and restart systemd service
      run: |
        ssh root@${{ secrets.HOST }} "systemctl daemon-reload && systemctl enable ${{ env.APP_NAME }} && systemctl restart ${{ env.APP_NAME }}"
